name: Quark签到

on:
  schedule:
    - cron: '0 1 * * *'   # 北京时间 09:00 (UTC+8 -> UTC+1)
    - cron: '0 5 * * *'   # 北京时间 13:00 (UTC+8 -> UTC+5)
  workflow_dispatch:      # 允许手动触发

jobs:
  quark-sign-in:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4  # 升级 v4，解决 Node.js 弃用警告

      - name: 恢复签到成功记录缓存
        id: cache-restore
        uses: actions/cache@v4
        with:
          path: .last_success_date
          # 使用包含 run_id 的动态 key，确保每天都能正确生成新缓存
          key: last-success-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            last-success-${{ runner.os }}-

      - name: 判断今日是否已签到
        id: check
        run: |
          current_date=$(TZ='Asia/Shanghai' date '+%Y-%m-%d')
          echo "当前北京时间: $current_date"

          if [ -f .last_success_date ]; then
            last_date=$(cat .last_success_date)
            echo "上次签到日期: $last_date"
            if [ "$last_date" = "$current_date" ]; then
              echo "今天已成功签到，跳过执行。"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          echo "今天尚未签到，继续执行。"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: 随机延迟
        if: steps.check.outputs.skip == 'false'
        run: |
          if [ "${{ github.event.schedule }}" == "0 1 * * *" ]; then
            delay=$((RANDOM % 60))
            echo "早上签到，延迟 $delay 秒后开始.."
          else
            delay=$((RANDOM % 30))
            echo "下午兜底或手动触发，延迟 $delay 秒后开始.."
          fi
          sleep $delay

      - name: 设置Python环境
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-python@v5  # 升级 v5，解决 Node.js 弃用警告
        with:
          python-version: '3.10'

      - name: 安装依赖
        if: steps.check.outputs.skip == 'false'
        run: pip install requests

      - name: 执行签到脚本
        if: steps.check.outputs.skip == 'false'
        env:
          COOKIE_QUARK: ${{ secrets.COOKIE_QUARK }}
        run: python checkIn_Quark.py

      - name: 标记今天签到成功并生成文件
        if: success() && steps.check.outputs.skip == 'false'
        run: |
          date_str=$(TZ='Asia/Shanghai' date '+%Y-%m-%d')
          echo "$date_str" > .last_success_date
          echo "已记录成功签到日期: $date_str"

      - name: 清理旧的工作流记录
        uses: Mattraks/delete-workflow-runs@main
        if: always()
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 60
